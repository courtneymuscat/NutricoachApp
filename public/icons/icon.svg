<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#FFD034" rx="112"/>

  <!-- Leaf accent (top-right, behind N) -->
  <ellipse cx="342" cy="138" rx="52" ry="28" fill="#FFE680" opacity="0.7" transform="rotate(-40 342 138)"/>
  <ellipse cx="362" cy="118" rx="38" ry="18" fill="#FFED99" opacity="0.5" transform="rotate(-40 362 118)"/>

  <!-- Bold white N -->
  <!-- Left stroke -->
  <rect x="110" y="138" width="72" height="236" rx="18" fill="white"/>
  <!-- Right stroke -->
  <rect x="330" y="138" width="72" height="236" rx="18" fill="white"/>
  <!-- Diagonal stroke (top-left to bottom-right) -->
  <polygon points="182,138 254,138 402,374 330,374" fill="white"/>

  <!-- Small leaf/spark mark above the N (brand accent) -->
  <circle cx="382" cy="108" r="18" fill="white" opacity="0.9"/>
  <circle cx="410" cy="82" r="11" fill="white" opacity="0.6"/>
  <circle cx="396" cy="76" r="7" fill="white" opacity="0.4"/>
</svg>
